<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dependency Deadlock Detector — Blast Radius</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #111a2e;
    --panel-2: #0e1626;
    --line: #2a3650;
    --text: #e6edf7;
    --muted: #8aa0c0;
    --red: #ff4d4f;
    --amber: #ff9f43;
    --green: #2dd4a7;
    --blue: #4c8dff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  header {
    padding: 18px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 650; }
  header .sub { color: var(--muted); font-size: 13px; }
  .banner {
    margin: 0 24px; margin-top: 14px; padding: 10px 16px; border-radius: 10px;
    background: rgba(255,77,79,.08); border: 1px solid rgba(255,77,79,.35);
    color: #ffd0d1; font-size: 13.5px;
  }
  .banner b { color: #fff; }
  .wrap { display: flex; gap: 0; height: calc(100vh - 132px); }
  .canvas { flex: 1; overflow: auto; position: relative; }
  .side {
    width: 360px; flex-shrink: 0; border-left: 1px solid var(--line);
    background: var(--panel-2); padding: 18px 18px 28px; overflow-y: auto;
  }
  svg { display: block; }
  .legend { display: flex; gap: 16px; margin-left: auto; font-size: 12px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }

  .node rect {
    rx: 9; stroke-width: 1.5; fill: var(--panel);
    stroke: var(--line); cursor: pointer; transition: filter .15s;
  }
  .node:hover rect { filter: brightness(1.25); }
  .node .key { font-weight: 650; font-size: 12.5px; fill: var(--text); }
  .node .sum { font-size: 10.5px; fill: var(--muted); }
  .node.healthy rect { stroke: var(--green); fill: #0f231b; }
  .node.blast rect   { stroke: var(--amber); fill: #281a0e; }
  .node.root rect    { stroke: var(--red); fill: #2a0e12; stroke-width: 2.5;
                       filter: drop-shadow(0 0 10px rgba(255,77,79,.55)); }
  .node.selected rect { stroke: var(--blue); stroke-width: 2.5; }
  .node.root rect { animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { filter: drop-shadow(0 0 6px rgba(255,77,79,.35)); }
    50%      { filter: drop-shadow(0 0 16px rgba(255,77,79,.8)); }
  }
  .edge { stroke: var(--line); stroke-width: 1.6; fill: none; }
  .edge.hot { stroke: var(--amber); stroke-width: 2.2; }
  .edge.root { stroke: var(--red); stroke-width: 2.6; }

  .side h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
             color: var(--muted); margin: 0 0 10px; }
  .kv { margin: 4px 0; font-size: 13px; }
  .kv b { color: var(--muted); font-weight: 500; display: inline-block; min-width: 92px; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px;
           font-weight: 650; letter-spacing: .03em; }
  .badge.CRITICAL { background: rgba(255,77,79,.18); color: #ff8587; border: 1px solid var(--red); }
  .badge.HIGH { background: rgba(255,159,67,.18); color: var(--amber); border: 1px solid var(--amber); }
  .badge.MEDIUM { background: rgba(76,141,255,.18); color: var(--blue); border: 1px solid var(--blue); }
  .badge.LOW { background: rgba(45,212,167,.15); color: var(--green); border: 1px solid var(--green); }
  .msg {
    margin-top: 14px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px; font-size: 13px; white-space: pre-wrap;
    color: #dbe6f6;
  }
  .msg .tag { color: var(--blue); font-size: 11px; text-transform: uppercase;
              letter-spacing: .05em; margin-bottom: 8px; display: block; }
  button.approve {
    margin-top: 12px; width: 100%; padding: 10px; border: 0; border-radius: 8px;
    background: var(--green); color: #06281e; font-weight: 700; cursor: pointer;
    font-size: 13.5px;
  }
  button.approve:active { transform: translateY(1px); }
  .hint { color: var(--muted); font-size: 12px; margin-top: 14px; }
</style>
</head>
<body>
  <header>
    <h1>Dependency Deadlock Detector</h1>
    <span class="sub" id="scan"></span>
    <div class="legend">
      <span><i class="dot" style="background:#2dd4a7"></i>healthy</span>
      <span><i class="dot" style="background:#ff9f43"></i>blocked downstream</span>
      <span><i class="dot" style="background:#ff4d4f"></i>silent root</span>
    </div>
  </header>
  <div class="banner" id="banner"></div>
  <div class="wrap">
    <div class="canvas"><svg id="svg"></svg></div>
    <aside class="side" id="side"></aside>
  </div>

  <script src="graph_data.js"></script>
  <script>
    const D = window.GRAPH_DATA;
    const NODE_W = 178, NODE_H = 58, COL = 250, ROW = 88, MARGIN = 40;

    // --- layered (longest-path) layout for the DAG ---
    function layout(nodes, edges) {
      const out = {}, indeg = {};
      nodes.forEach(n => { out[n.id] = []; indeg[n.id] = 0; });
      edges.forEach(e => { out[e.from].push(e.to); indeg[e.to]++; });
      const layer = {}; nodes.forEach(n => layer[n.id] = 0);
      const deg = { ...indeg };
      const q = nodes.filter(n => indeg[n.id] === 0).map(n => n.id);
      while (q.length) {
        const u = q.shift();
        out[u].forEach(v => {
          layer[v] = Math.max(layer[v], layer[u] + 1);
          if (--deg[v] === 0) q.push(v);
        });
      }
      const byLayer = {};
      nodes.forEach(n => { (byLayer[layer[n.id]] ||= []).push(n.id); });
      const pos = {};
      Object.keys(byLayer).forEach(L => {
        byLayer[L].forEach((id, i) => {
          pos[id] = { x: MARGIN + L * COL, y: MARGIN + i * ROW };
        });
      });
      return pos;
    }

    const pos = layout(D.nodes, D.edges);
    const nodeById = Object.fromEntries(D.nodes.map(n => [n.id, n]));
    const blast = new Set(D.nodes.filter(n => n.in_blast).map(n => n.id));
    const roots = new Set(D.root_keys);

    const maxX = Math.max(...Object.values(pos).map(p => p.x)) + NODE_W + MARGIN;
    const maxY = Math.max(...Object.values(pos).map(p => p.y)) + NODE_H + MARGIN;

    const svg = document.getElementById("svg");
    svg.setAttribute("width", maxX);
    svg.setAttribute("height", maxY);
    svg.setAttribute("viewBox", `0 0 ${maxX} ${maxY}`);

    const NS = "http://www.w3.org/2000/svg";
    function el(tag, attrs, parent) {
      const e = document.createElementNS(NS, tag);
      for (const k in attrs) e.setAttribute(k, attrs[k]);
      if (parent) parent.appendChild(e);
      return e;
    }

    // arrowheads
    const defs = el("defs", {}, svg);
    [["arrow", "#2a3650"], ["arrow-hot", "#ff9f43"], ["arrow-root", "#ff4d4f"]].forEach(([id, c]) => {
      const m = el("marker", { id, markerWidth: 9, markerHeight: 9, refX: 8, refY: 4,
        orient: "auto", markerUnits: "userSpaceOnUse" }, defs);
      el("path", { d: "M0,0 L8,4 L0,8 z", fill: c }, m);
    });

    // edges
    D.edges.forEach(e => {
      const a = pos[e.from], b = pos[e.to];
      if (!a || !b) return;
      const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2;
      const x2 = b.x, y2 = b.y + NODE_H / 2;
      const mx = (x1 + x2) / 2;
      let cls = "edge", marker = "arrow";
      if (roots.has(e.from) || (blast.has(e.from) && blast.has(e.to))) { cls = "edge hot"; marker = "arrow-hot"; }
      if (roots.has(e.from)) { cls = "edge root"; marker = "arrow-root"; }
      el("path", { class: cls, "marker-end": `url(#${marker})`,
        d: `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2 - 9},${y2}` }, svg);
    });

    // nodes
    const groups = {};
    D.nodes.forEach(n => {
      const p = pos[n.id];
      let cls = "node healthy";
      if (n.is_root) cls = "node root";
      else if (n.in_blast) cls = "node blast";
      const g = el("g", { class: cls, transform: `translate(${p.x},${p.y})` }, svg);
      el("rect", { width: NODE_W, height: NODE_H }, g);
      const key = el("text", { x: 12, y: 22, class: "key" }, g);
      key.textContent = n.id + (n.is_root ? "  ⚠" : "");
      const sum = el("text", { x: 12, y: 40, class: "sum" }, g);
      sum.textContent = (n.summary.length > 26 ? n.summary.slice(0, 25) + "…" : n.summary);
      const meta = el("text", { x: 12, y: 52, class: "sum" }, g);
      meta.textContent = n.stale ? `silent ${n.days_stale}d · ${n.owner_tz}` : n.status;
      g.addEventListener("click", () => select(n.id));
      groups[n.id] = g;
    });

    function select(id) {
      Object.values(groups).forEach(g => g.classList.remove("selected"));
      groups[id].classList.add("selected");
      renderSide(nodeById[id]);
    }

    function renderSide(n) {
      const side = document.getElementById("side");
      const sevBadge = n.severity ? `<span class="badge ${n.severity}">${n.severity} · ${n.severity_score}</span>` : "";
      let html = `<h2>${n.id}</h2>`;
      html += `<div class="kv"><b>Summary</b>${n.summary}</div>`;
      html += `<div class="kv"><b>Status</b>${n.status}</div>`;
      html += `<div class="kv"><b>Owner</b>${n.owner} <span style="color:var(--muted)">(${n.owner_tz})</span></div>`;
      html += `<div class="kv"><b>Type</b>${n.dep_type.replace(/_/g," ")}</div>`;
      if (n.stale) html += `<div class="kv"><b>Silent</b>${n.days_stale} working day(s)</div>`;
      if (n.is_root) {
        html += `<div class="kv"><b>Severity</b>${sevBadge}</div>`;
        if (n.days_to_milestone != null) html += `<div class="kv"><b>Milestone</b>${n.milestone} · in ${n.days_to_milestone}d</div>`;
        html += `<div class="msg"><span class="tag">✦ Drafted by Claude (Azure Foundry)</span>${n.message}</div>`;
        html += `<button class="approve">Approve &amp; send →</button>`;
      } else if (n.in_blast) {
        html += `<div class="hint">Blocked downstream by a silent dependency. It will clear once the root is unblocked.</div>`;
      } else {
        html += `<div class="hint">Healthy — recent activity, not blocked.</div>`;
      }
      side.innerHTML = html;
    }

    // header + banner
    document.getElementById("scan").textContent =
      "scan " + D.generated_at.replace("T", " ").replace("+00:00", " UTC");
    const root0 = nodeById[D.root_keys[0]];
    document.getElementById("banner").innerHTML = root0
      ? `<b>${D.root_keys.length} silent dependency</b> (${root0.id}, ${root0.days_stale} working days) is blocking `
        + `<b>${D.blast_count} downstream tickets</b> — milestone <b>${root0.milestone}</b> due in `
        + `<b>${root0.days_to_milestone} days</b> and now at risk.`
      : "No stale dependencies detected.";

    if (D.root_keys.length) select(D.root_keys[0]);
  </script>
</body>
</html>
